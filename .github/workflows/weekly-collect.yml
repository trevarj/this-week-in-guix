name: weekly collect

on:
  schedule:
    - cron: "0 21 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect weekly data
        timeout-minutes: 10
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python3 scripts/collect.py --out bundle.json --summary summary.md

      - name: Upload review bundle
        uses: actions/upload-artifact@v4
        with:
          name: this-week-in-guix-${{ github.run_id }}
          path: |
            bundle.json
            summary.md
          retention-days: 14

      - name: Create review release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "review-${{ github.run_id }}" bundle.json summary.md \
            --title "This Week in Guix review bundle ${{ github.run_id }}" \
            --notes "@${{ github.repository_owner }} review bundle ready.

          Download the attached bundle.json and summary.md files, then use the this-week-in-guix skill to draft the post."
